<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Explore career subdomains within your selected domain"/>
<title>Career Subdomains - UDCOE</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
 
<style>
:root {
  --primary: #2E7D32;        /* Forest Green */
  --secondary: #e0e0e0;      /* Light text */
  --background: #0f0f0f;     /* Almost Black */
  --surface: #1a1a1a;        /* Card background */
  --border: #2c2c2c;
  --accent: #66BB6A;         /* Soft green highlight */
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #0b0b0b 0%, #1a1a1a 100%);
  color: var(--secondary);
  padding-top: 20px;
  line-height: 1.6;
}

/* WCAG 2.1: Focus Indicators */
*:focus {
  outline: 3px solid #FFD700 !important;
  outline-offset: 2px !important;
}

/* WCAG 2.1: Skip Link */
.skip-to-main {
  position: absolute;
  top: -40px;
  left: 0;
  background: #000;
  color: white;
  padding: 8px 16px;
  z-index: 100;
  text-decoration: none;
  border-radius: 0 0 4px 0;
  font-weight: bold;
}

.skip-to-main:focus {
  top: 0;
}

/* Main content wrapper */
.content-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}

/* Domain Header */
.domain-header {
  background: linear-gradient(
    135deg,
    #2E7D32 0%,
    #1B5E20 100%
  );
  color: #fff;
  padding: 40px;
  border-radius: 18px;
  margin-bottom: 30px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
}

.domain-header h1 {
  font-weight: 700;
  letter-spacing: 0.5px;
  font-size: 2rem;
  line-height: 1.2;
}

.domain-header p {
  opacity: 0.85;
  font-size: 1.05rem;
  margin-bottom: 0;
}

/* Grid for subdomains */
.subdomain-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

/* Subdomain Card */
.subdomain-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  transition: all 0.25s ease;
  cursor: pointer;
  position: relative;
  min-height: 200px;
  display: flex;
  flex-direction: column;
}

.subdomain-card:hover,
.subdomain-card:focus {
  transform: translateY(-6px);
  border-color: var(--primary);
  box-shadow: 0 12px 30px rgba(46, 125, 50, 0.25);
  outline: 3px solid #FFD700 !important;
  outline-offset: 2px !important;
}

.subdomain-card h5 {
  color: var(--primary);
  font-weight: 600;
  margin-bottom: 10px;
  font-size: 1.2rem;
}

.subdomain-card p {
  font-size: 0.95rem;
  opacity: 0.9;
  flex-grow: 1;
}

/* Button styling */
.btn-custom {
  background-color: var(--primary);
  color: #fff;
  border-radius: 10px;
  padding: 8px 18px;
  font-weight: 600;
  border: none;
}

.btn-custom:hover,
.btn-custom:focus {
  background-color: #4CAF50;
  color: #fff;
  outline: 3px solid #FFD700 !important;
  outline-offset: 2px !important;
}

/* Small text */
small {
  color: #bdbdbd;
}

</style>
</head>
<body>
<!-- WCAG 2.1: Skip to main content link -->
<a href="#main-content" class="skip-to-main">Skip to main content</a>

<div class="container content-container">
  <div class="breadcrumb-nav" role="navigation" aria-label="breadcrumb">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="../index.html#/dashboard" class="text-decoration-none"><i class="🏠 me-1" aria-hidden="true"></i><span>Home</span></a></li>
        <li class="breadcrumb-item"><a href="career-domains.html" class="text-decoration-none">Career Domains</a></li>
        <li class="breadcrumb-item active" aria-current="page">Subdomains</li>
      </ol>
    </nav>
  </div>

  <main id="main-content" role="main">
    <div id="domain-header" role="region" aria-label="Domain information">
      <!-- Domain header will be loaded here -->
    </div>

    <div id="subdomains-content" role="region" aria-live="polite" aria-label="Subdomains list">
    <!-- Subdomains will be loaded here -->
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/career-mapper.js"></script>
<script>
function loadSubdomains() {  const urlParams = new URLSearchParams(window.location.search);
  const domainKey = urlParams.get('domain');
  
  if (!domainKey) {
    window.location.href = 'career-domains.html';
    return;
  }

  // Load domain data from iframe
  const iframe = document.createElement('iframe');
  iframe.style.display = 'none';
  iframe.src = 'domain.html?domain=' + domainKey;
  
  iframe.onload = function() {
    try {
      const iframeDomainData = iframe.contentWindow.domainData;
      let domain = null;
      let subdomains = [];
      
      if (iframeDomainData && iframeDomainData[domainKey]) {
        domain = iframeDomainData[domainKey];
        subdomains = domain.subdomains || [];
        console.log('Loaded domain data from domain.html:', domain.name);
      } else {
        // Fallback to career-mapper
        domain = careerMapper.domains[domainKey];
        if (!domain) {
          window.location.href = 'career-domains.html';
          return;
        }
        
        // Get careers for this domain
        const careerPathsStr = localStorage.getItem('careerPaths');
        let careers = [];
        
        if (careerPathsStr) {
          const careerPaths = JSON.parse(careerPathsStr);
          careers = careerPaths.domains[domainKey] || [];
        } else {
          // Fallback: get all careers for this domain
          Object.values(careerMapper.careers).forEach(career => {
            if (career.domain === domainKey) {
              careers.push(career);
            }
          });
        }

        // Group careers by subdomain
        const subdomainsMap = {};
        careers.forEach(career => {
          const subdomain = career.subdomain || 'general';
          if (!subdomainsMap[subdomain]) {
            subdomainsMap[subdomain] = {
              name: subdomain.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' '),
              description: 'Career opportunities in this subdomain',
              careers: []
            };
          }
          subdomainsMap[subdomain].careers.push(career);
        });
        
        subdomains = Object.entries(subdomainsMap).map(([key, value]) => ({
          key: key,
          name: value.name,
          description: value.description,
          careers: value.careers
        }));
      }

      // Render domain header
      document.getElementById('domain-header').innerHTML = `
        <div class="domain-header">
          <h1><span style="font-size: 3rem;">${domain.icon || '📁'}</span></h1>
          <h2 class="mt-3">${domain.name}</h2>
          <p class="lead mt-2">${domain.description || ''}</p>
        </div>
      `;

      // Render subdomains
      if (subdomains.length === 0) {
        document.getElementById('subdomains-content').innerHTML = `
          <div class="alert alert-info" style="background: white; padding: 30px; border-radius: 15px; text-align: center;">
            <h4>No Subdomains Available</h4>
            <p>This domain is currently being updated with career information.</p>
            <a href="career-domains.html" class="btn-custom" style="display: inline-block; padding: 10px 20px; margin-top: 15px; background-color: var(--primary); color: #fff; border-radius: 10px; text-decoration: none;">Back to Domains</a>
          </div>
        `;
        return;
      }
      
      let html = '<div class="subdomain-grid">';
      
      subdomains.forEach((subdomain, index) => {
        const subdomainKey = subdomain.key || `subdomain-${index}`;
        const careerCount = subdomain.careers ? subdomain.careers.length : 0;
        
        html += `
          <div class="subdomain-card" 
               onclick="navigateToCareers('${domainKey}', '${subdomainKey}')"
               role="button"
               tabindex="0"
               onkeypress="if(event.key==='Enter') navigateToCareers('${domainKey}', '${subdomainKey}')">
            <h5 style="color: var(--primary); font-weight: 600; margin-bottom: 10px; font-size: 1.2rem;">${subdomain.name}</h5>
            <p style="font-size: 0.95rem; opacity: 0.9;">
              ${subdomain.description || 'Explore career opportunities in this subdomain'}
            </p>
            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #e0e0e0; font-weight: 500;">
              <i class="💼 me-2"></i>${careerCount} Career ${careerCount === 1 ? 'Path' : 'Paths'}
            </div>
          </div>
        `;
      });

      html += '</div>';
      
      document.getElementById('subdomains-content').innerHTML = html;
      
      // Remove iframe after loading
      document.body.removeChild(iframe);
    } catch (e) {
      console.error('Error loading domain data:', e);
      // Fallback
      useFallbackData();
      document.body.removeChild(iframe);
    }
  };
  
  document.body.appendChild(iframe);
  
  // Timeout fallback
  setTimeout(() => {
    if (iframe.parentNode) {
      console.warn('Timeout loading domain.html, using fallback');
      useFallbackData();
      document.body.removeChild(iframe);
    }
  }, 3000);
  
  function useFallbackData() {
    const domain = careerMapper.domains[domainKey];
    if (!domain) {
      window.location.href = 'career-domains.html';
      return;
    }

    // Render domain header
    document.getElementById('domain-header').innerHTML = `
      <div class="domain-header">
        <h1><span style="font-size: 3rem;">${domain.icon}</span></h1>
        <h2 class="mt-3">${domain.name}</h2>
        <p class="lead mt-2">${domain.description}</p>
      </div>
    `;

    // Get careers for this domain
    const careerPathsStr = localStorage.getItem('careerPaths');
    let careers = [];
    
    if (careerPathsStr) {
      const careerPaths = JSON.parse(careerPathsStr);
      careers = careerPaths.domains[domainKey] || [];
    } else {
      // Fallback: get all careers for this domain
      Object.values(careerMapper.careers).forEach(career => {
        if (career.domain === domainKey) {
          careers.push(career);
        }
      });
    }

    // Group careers by subdomain
    const subdomainsMap = {};
    careers.forEach(career => {
      const subdomain = career.subdomain || 'general';
      if (!subdomainsMap[subdomain]) {
        subdomainsMap[subdomain] = {
          name: subdomain.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' '),
          careers: []
        };
      }
      subdomainsMap[subdomain].careers.push(career);
    });

    // Render subdomains
    let html = '<div class="subdomain-grid">';
    
    Object.entries(subdomainsMap).forEach(([subdomainKey, subdomain]) => {
      html += `
        <div class="subdomain-card" 
             onclick="navigateToCareers('${domainKey}', '${subdomainKey}')"
             role="button"
             tabindex="0"
             onkeypress="if(event.key==='Enter') navigateToCareers('${domainKey}', '${subdomainKey}')">
          <div class="subdomain-title">${subdomain.name}</div>
          <div class="subdomain-description">
            Explore ${subdomain.careers.length} career ${subdomain.careers.length === 1 ? 'path' : 'paths'} in this subdomain
          </div>
          <div class="career-count">
            <i class="💼 me-1"></i>${subdomain.careers.length} Careers
          </div>
        </div>
      `;
    });

    html += '</div>';
    
    document.getElementById('subdomains-content').innerHTML = html;
  }
}

function navigateToCareers(domainKey, subdomainKey) {
  window.location.href = `career-paths.html?domain=${domainKey}&subdomain=${subdomainKey}`;
}

document.addEventListener('DOMContentLoaded', loadSubdomains);
</script>

    </div>
  </main>

  <footer class="mt-5 py-4" style="border-top: 1px solid rgba(255, 140, 0, 0.2); text-align: center; color: var(--secondary);">
    <p class="mb-0">Universal Disability Career & Opportunity Engine (UDCOE)</p>
    <p class="mb-0">© 2026 An initiative under the Rights of Persons with Disabilities Act, 2016</p>
  </footer>
</div>
</body>
</html>
